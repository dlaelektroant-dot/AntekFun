<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>404 – nieznany link</title>
   <style></style>
  </style>
</head>

<body>
  <section>
    <h1>404</h1>
    <h3>nieznany link</h3>

    <button class="btn"
      onclick="window.location.href='mailto:anteczex@gmail.com?subject=Siema&body=To%20jest%20wiadomosc';">
      kontakt
    </button>

    <button id="startBtn" class="btn">
      Zacznij zabawę
    </button>
  </section>

  <script>
    // po 10 sekundach pokaż guzik
    setTimeout(() => {
      const btn = document.getElementById("startBtn");
      btn.style.display = "inline-block";
      requestAnimationFrame(() => {
        btn.style.opacity = "1";
      });
    }, 10000);

    // klik → strona zabawy
    document.getElementById("startBtn").onclick = () => {
      window.location.href = "https://dlaelektroant-dot.github.io/OrgAntekFun/";
    };
  </script>
</body>
</html>
