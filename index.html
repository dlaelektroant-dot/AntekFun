<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>AntekFun – 404 nieznany link</title>

  <!-- SEO -->
  <meta name="title" content="AntekFun – oficjalna strona Antka">
  <meta name="description" content="AntekFun – projekty, gry i zabawy tworzone przez Antka.">
  <meta name="keywords" content="antekfun, antek fun, antek, gry, projekty, zabawa, neal.fun">
  <meta name="robots" content="index, follow">

  <!-- OpenGraph (Discord, Messenger, FB) -->
  <meta property="og:title" content="AntekFun – oficjalna strona Antka">
  <meta property="og:description" content="Gry, projekty i zabawy od Antka.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dlaelektroant-dot.github.io/AntekFun/">
  <meta property="og:image" content="https://dlaelektroant-dot.github.io/AntekFun/og.png">

  <!-- Favicon (opcjonalnie) -->
  <link rel="icon" href="favicon.png">

  <style>
    body{
      font-family:Arial, sans-serif;
      text-align:center;
      padding-top:80px;
    }

    #startBtn{
      padding:18px 40px;
      font-size:20px;
      font-weight:700;
      color:white;
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      border:none;
      border-radius:16px;
      cursor:pointer;
      box-shadow:0 10px 25px rgba(37,99,235,.35);
      transition:all .25s ease, opacity .5s ease;
      opacity:0;          
      display:none;       
    }

    #startBtn:hover{
      transform:translateY(-3px);
      box-shadow:0 15px 35px rgba(37,99,235,.45);
    }

    #startBtn:active{
      transform:scale(.97);
    }
  </style>
</head>

<body>
  <section>
    <h1>404</h1>
    <h3>nieznany link</h3>

    <button class="btn"
      onclick="window.location.href='mailto:anteczex@gmail.com?subject=Siema&body=To%20jest%20wiadomosc';">
      kontakt
    </button>

    <button id="startBtn" class="btn">
      Zacznij zabawę
    </button>
  </section>

  <script>
    // po 10 sekundach pokaż guzik
    setTimeout(() => {
      const btn = document.getElementById("startBtn");
      btn.style.display = "inline-block";

      requestAnimationFrame(() => {
        btn.style.opacity = "1";   // płynne pojawienie
      });
    }, 10000);

    // klik → strona zabawy
    document.getElementById("startBtn").onclick = () => {
      window.location.href = "https://dlaelektroant-dot.github.io/OrgAntekFun/";
    };
  </script>
</body>
</html>
